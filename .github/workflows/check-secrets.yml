name: Check secrets (diagnostic)

# One-off diagnostic: confirms GitHub sees DATABASE_URL / FMP_API_KEY without
# ever printing their values or making any external network call. Safe to
# run any time at no cost. Not part of the automated pipeline.
on:
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Report presence (not value) of each secret
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: |
          if [ -n "$DATABASE_URL" ]; then
            echo "DATABASE_URL: present (${#DATABASE_URL} characters)"
          else
            echo "DATABASE_URL: MISSING"
          fi
          if [ -n "$FMP_API_KEY" ]; then
            echo "FMP_API_KEY: present (${#FMP_API_KEY} characters)"
          else
            echo "FMP_API_KEY: MISSING"
          fi
