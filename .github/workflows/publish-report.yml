name: Publish Market Priority Report

# Quarterly rebalance + on-demand run (docs/AUTOMATION_AND_DEPLOYMENT.md).
# "Run the Market Priority Report" from the PRD maps to workflow_dispatch:
# a non-technical owner triggers this from the GitHub Actions tab, no code
# or terminal required.
#
# Requires the SAME persistent DATABASE_URL secret as ingest.yml so this job
# can see data that job ingested — without it, this will reliably report
# "blocked" (empty database) rather than publish anything, since a fresh
# ephemeral database has no ingested prices/macro/fundamentals to check.
# See docs/DECISIONS.md.
#
# The report artifact is uploaded so it's retrievable even before a
# persistent report store (e.g. cloud storage) is wired up.
on:
  schedule:
    - cron: "0 13 1 1,4,7,10 *"
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: python run_report.py --output output
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - name: Print report to job log (no artifact download needed to read it)
        if: always()
        run: |
          if [ -f output/market_priority_report.md ]; then
            echo "::group::market_priority_report.md"
            cat output/market_priority_report.md
            echo "::endgroup::"
          fi
          if [ -f output/data_quality_failure.md ]; then
            echo "::group::data_quality_failure.md"
            cat output/data_quality_failure.md
            echo "::endgroup::"
          fi
      - name: Print full factor x macro diagnostics (including non-FDR-surviving pairs)
        if: always()
        run: |
          echo "::group::full diagnostics (unfiltered by FDR)"
          python print_diagnostics.py --output output
          echo "::endgroup::"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: market-priority-report
          path: output/
