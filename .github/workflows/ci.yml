name: CI
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: ruff check .
      - run: python adaptive_market_priority_engine.py --synthetic --output /tmp/ampe_synth
      - run: python adaptive_market_priority_engine.py --synthetic-null --output /tmp/ampe_null
