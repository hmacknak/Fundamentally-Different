name: Probe SimFin API (temporary, diagnostic only)

# One-off probe to check what SimFin's free tier actually returns before
# deciding whether to build a real provider adapter or pay for a deeper FMP
# tier. Not part of the production pipeline. Delete once the evaluation in
# docs/DECISIONS.md is resolved. Requires no repo changes on success or
# failure -- it only prints findings to the job log.

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe SimFin endpoints and report coverage
        env:
          SIMFIN_API_KEY: ${{ secrets.SIMFIN_API_KEY }}
        run: |
          python3 <<'PYEOF'
          import json
          import os
          import urllib.error
          import urllib.request

          KEY = os.environ["SIMFIN_API_KEY"]

          def redact(s):
              return s.replace(KEY, "***REDACTED***") if s else s

          def try_get(url, headers=None, timeout=20):
              req = urllib.request.Request(url, headers=headers or {})
              try:
                  with urllib.request.urlopen(req, timeout=timeout) as resp:
                      body = resp.read().decode("utf-8", errors="replace")
                      return resp.status, redact(body)[:1500]
              except urllib.error.HTTPError as e:
                  body = e.read().decode("utf-8", errors="replace")
                  return e.code, redact(body)[:1500]
              except Exception as e:
                  return None, redact(str(e))

          print("=== Step 1: which base URL / auth scheme authenticates? ===")
          candidates = [
              ("v1 query-param, companies/list",
               f"https://simfin.com/api/v1/companies/list?api-key={KEY}", None),
              ("v2 query-param, companies/list",
               f"https://simfin.com/api/v2/companies/list?api-key={KEY}", None),
              ("v3 header Authorization, companies/list",
               "https://backend.simfin.com/api/v3/companies/list",
               {"Authorization": KEY}),
              ("v3 header 'api-key', companies/list",
               "https://backend.simfin.com/api/v3/companies/list",
               {"api-key": KEY}),
          ]
          working = []
          for label, url, headers in candidates:
              status, body = try_get(url, headers)
              print(f"--- {label} ---\nstatus={status}\n{body}\n")
              if status == 200:
                  working.append((label, url, headers))

          if not working:
              print("=== RESULT: no candidate authenticated successfully. ===")
              print("SimFin's live REST API may require a paid SimFin+ plan, or "
                    "the endpoint shapes above are stale. Recommend manually "
                    "checking a current SimFin API key dashboard/docs page "
                    "logged in as the account owner before further engineering.")
          else:
              print(f"=== RESULT: {len(working)} candidate(s) authenticated. ===")
              _, list_url, headers = working[0]
              root = "https://backend.simfin.com/api/v3"

              print("\n=== Step 2: look up a company ID by ticker ===")
              company_id = None
              for path in [
                  f"{root}/companies/general/compact?ticker=AAPL",
                  f"{root}/companies/general?ticker=AAPL",
                  f"{root}/companies/id/find?ticker=AAPL",
              ]:
                  status, body = try_get(path, headers)
                  print(f"--- {path} ---\nstatus={status}\n{body}\n")
                  if status == 200:
                      try:
                          data = json.loads(body if body.strip().startswith(("{", "[")) else "{}")
                          if isinstance(data, list) and data:
                              company_id = data[0].get("id") or data[0].get("simId")
                          elif isinstance(data, dict):
                              company_id = data.get("id") or data.get("simId")
                      except Exception:
                          pass

              print(f"\n=== Step 3: statement endpoints (resolved company_id={company_id}) ===")
              candidates2 = [
                  f"{root}/companies/statements/compact?ticker=AAPL&statements=PL&period=Q1,Q2,Q3,Q4,FY&fyear=2005-2026",
                  f"{root}/companies/statements/compact?ticker=AAPL&statements=pl&period=quarterly",
                  f"{root}/companies/statements?ticker=AAPL&statements=PL",
              ]
              if company_id:
                  candidates2.append(
                      f"{root}/companies/id/{company_id}/statements/standardised"
                      f"?statements=PL&period=Q1,Q2,Q3,Q4,FY&fyear=2005-2026")
                  candidates2.append(f"{root}/companies/id/{company_id}")
              for path in candidates2:
                  status, body = try_get(path, headers)
                  print(f"--- {path} ---\nstatus={status}\n{body}\n")
          PYEOF
