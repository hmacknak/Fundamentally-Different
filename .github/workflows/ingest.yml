name: Ingest market data

# Daily price/macro refresh + fundamentals (docs/AUTOMATION_AND_DEPLOYMENT.md
# schedule). Runs on a public runner with an ephemeral filesystem: without a
# DATABASE_URL secret pointing at a persistent database, each run starts from
# an empty database and ingestion history will NOT accumulate day over day.
# This is a real infrastructure decision for the repo owner — see
# docs/DECISIONS.md "Open items requiring the owner" before relying on this
# schedule for anything beyond a dry run.
#
# Secrets this workflow can use (Settings -> Secrets and variables -> Actions):
#   DATABASE_URL   optional; a persistent Postgres URL. Falls back to a
#                  throwaway local SQLite file if unset.
#   FMP_API_KEY    optional; paid FMP account. Fundamentals ingestion is
#                  skipped with a warning (not a failure) if unset.
on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:
    inputs:
      fundamentals_period:
        description: "Fundamentals frequency (some FMP plans only allow 'annual')"
        type: choice
        options: ["quarter", "annual"]
        default: "quarter"

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: python run_ingestion.py --fundamentals-period "${{ github.event.inputs.fundamentals_period || 'quarter' }}"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
